<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Para o amor da minha vida 💖</title>
    <style>
        body {
            margin: 0;
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #ffb6c1, #ffc0cb);
            text-align: center;
            color: #fff;
        }

        h1 {
            margin-top: 40px;
            padding: 20px;
            font-size: 28px;
        }

        .container {
            max-width: 900px;
            margin: auto;
            padding: 20px;
        }

        .card {
            background: rgba(255, 255, 255, 0.15);
            border-radius: 20px;
            padding: 20px;
            margin: 30px 0;
            box-shadow: 0 0 20px rgba(0,0,0,0.2);
        }

        .card img {
            width: 100%;
            max-width: 500px;
            border-radius: 15px;
            box-shadow: 0 0 15px rgba(0,0,0,0.3);
        }

        .texto {
            margin-top: 15px;
            font-size: 18px;
            line-height: 1.5;
        }

        .hearts {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
        }

        .heart {
            position: absolute;
            color: rgba(255, 0, 80, 0.6);
            font-size: 20px;
            animation: cair 6s linear infinite;
        }

        @keyframes cair {
            0% {
                transform: translateY(-10%);
                opacity: 1;
            }
            100% {
                transform: translateY(110%);
                opacity: 0;
            }
        }
    </style>
</head>
<body>

    <div class="hearts" id="hearts"></div>

    <h1>
        Dedicado a mulher da minha vida, minha futura esposa e mãe dos meus filhos. <br>
        Isto é para você minha princesa, eu espero que goste e possa me entender um pouco mais pois eu te amo 💖
    </h1>

    <div class="container">
        {% for foto in fotos %}
        <div class="card">
            <img src="{{ url_for('static', filename='fotos/' + foto.img) }}">
            <div class="texto">{{ foto.texto }}</div>
        </div>
        {% endfor %}
    </div>

    <script>
        const hearts = document.getElementById("hearts");

        function criarCoracao() {
            const heart = document.createElement("div");
            heart.classList.add("heart");
            heart.innerHTML = "💖";
            heart.style.left = Math.random() * 100 + "vw";
            heart.style.animationDuration = (Math.random() * 3 + 3) + "s";
            hearts.appendChild(heart);

            setTimeout(() => {
                heart.remove();
            }, 6000);
        }

        setInterval(criarCoracao, 400);
    </script>

</body>
</html>
